<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NBA Teams - NBA Zone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .conference-header {
            padding: 15px; border-radius: 10px; color: white; margin: 30px 0 20px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }
        .east-bg { background: linear-gradient(90deg, #1d428a 0%, #002b5e 100%); }
        .west-bg { background: linear-gradient(90deg, #c8102e 0%, #860013 100%); }

        .division-title {
            font-size: 1.2rem; color: #444; border-left: 4px solid #ddd;
            padding-left: 10px; margin-bottom: 15px; margin-top: 25px;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .team-card {
            background: white; border-radius: 12px; transition: transform 0.2s, box-shadow 0.2s;
            border: none; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-decoration: none; color: inherit; display: block;
            margin-bottom: 10px;
        }
        .team-card:hover {
            transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); color: inherit;
        }
        .team-logo-container {
            background: #f9f9f9; padding: 20px; text-align: center; height: 120px;
            display: flex; align-items: center; justify-content: center;
        }
        .team-logo { max-height: 80px; width: auto; object-fit: contain; }
        .team-info { padding: 15px; text-align: center; border-top: 1px solid #eee; }
        .team-name { font-weight: 800; font-size: 0.95rem; margin-bottom: 0; color: #333; }

        @media (max-width: 1200px) { .teams-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .teams-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body class="container py-4">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="fw-bold">🏀 WSZYSTKIE DRUŻYNY NBA 🏀</h1>
    <a th:href="@{/players}" class="btn btn-dark shadow-sm">PRZEJDŹ DO LISTY GRACZY</a>
    <a th:href="@{/trade-machine}" class="btn btn-danger">TRADE MACHINE</a>
    <a th:href="@{/trade-machine/transfers}" class="btn btn-warning">HISTORIA TRANSFERÓW</a>


</div>

<div class="conference-header east-bg shadow">KONFERENCJA WSCHODNIA</div>

<th:block th:each="currentDiv : ${eastDivisions}">
    <h3 class="division-title" th:text="${currentDiv}">DYWIZJA</h3>
    <div class="teams-grid">
        <th:block th:each="t : ${eastTeams}">
            <a th:if="${t.division == currentDiv}"
               th:href="@{/teams/{id}(id=${t.id})}" class="team-card">
                <div class="team-logo-container">
                    <img th:src="${t.logoPath}" class="team-logo"
                         onerror="this.src='/images/logos/nba_logo.svg';">
                </div>
                <div class="team-info">
                    <div class="team-name" th:text="${t.name}">NAZWA DRUŻYNY</div>
                </div>
            </a>
        </th:block>
    </div>
</th:block>

<div class="conference-header west-bg shadow">KONFERENCJA ZACHODNIA</div>

<th:block th:each="currentDiv : ${westDivisions}">
    <h3 class="division-title" th:text="${currentDiv}">DYWIZJA</h3>
    <div class="teams-grid">
        <th:block th:each="t : ${westTeams}">
            <a th:if="${t.division == currentDiv}"
               th:href="@{/teams/{id}(id=${t.id})}" class="team-card">
                <div class="team-logo-container">
                    <img th:src="${t.logoPath}" class="team-logo"
                         onerror="this.src='/images/logos/nba_logo.svg';">
                </div>
                <div class="team-info">
                    <div class="team-name" th:text="${t.name}">NAZWA DRUŻYNY</div>
                </div>
            </a>
        </th:block>
    </div>
</th:block>

</body>
</html>
