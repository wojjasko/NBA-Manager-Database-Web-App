<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NBA Transaction Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .trade-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; border: none; }

        .tier-1-header { background: linear-gradient(45deg, #4b0082, #8a2be2) !important; color: white; }
        .tier-2-header { background: linear-gradient(45deg, #0f172a, #1e3a8a) !important; color: white; }
        .tier-3-header { background: linear-gradient(45deg, #334155, #475569) !important; color: white; }
        .tier-4-header { background: linear-gradient(45deg, #1e3a8a, #3b82f6) !important; color: white; }


        .trade-header { padding: 15px 25px; font-weight: 600; letter-spacing: 0.5px; }
        .player-name { font-size: 0.95rem; line-height: 1.2; }
        .player-meta { font-size: 0.75rem; color: #64748b; line-height: 1; }
        .text-muted { font-style: italic; font-size: 0.8rem; }
        .ovr-badge { background: #fef3c7; color: #92400e; padding: 2px 6px; border-radius: 4px; font-weight: 800; }
        .receive-label {
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #10b981;
            margin-bottom: 15px;
            display: block;
            border-bottom: 2px solid #ecfdf5;
            padding-bottom: 4px;
        }
        .main-pos { font-weight: 800; color: #1e293b; }
        .salary-tag { color: #1e293b; font-weight: 600; }
        .salary-summary { border-top: 1px solid #e2e8f0; padding-top: 10px; margin-top: 15px; font-size: 0.85rem; }
        .text-incoming { color: #10b981; }
        .text-outgoing { color: #ef4444; }
        .asset-box { background: #f8fafc; border-left: 4px solid #64748b; padding: 8px 12px; border-radius: 4px; margin-top: 8px; }
    </style>
</head>
<body class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold text-dark">📜 NBA TRANSACTION LOG</h2>
    <a th:href="@{/teams}" class="btn btn-dark px-4 rounded-pill">POWRÓT</a>
</div>

<div class="mb-4 d-flex gap-2">
    <a th:href="@{/trade-machine/transfers}" class="btn btn-outline-dark btn-sm rounded-pill">WSZYSTKIE</a>
    <a th:href="@{/trade-machine/transfers(tier=1)}" class="btn btn-outline-warning btn-sm rounded-pill">TIER 1</a>
    <a th:href="@{/trade-machine/transfers(tier=2)}" class="btn btn-outline-info btn-sm rounded-pill">TIER 2</a>
    <a th:href="@{/trade-machine/transfers(tier=3)}" class="btn btn-outline-secondary btn-sm rounded-pill">TIER 3</a>
    <a th:href="@{/trade-machine/transfers(tier=4)}" class="btn btn-outline-dark btn-sm rounded-pill">TIER 4</a>
</div>

<div th:each="trade : ${trades}" class="trade-card">
    <div class="trade-header d-flex justify-content-between align-items-center"
         th:classappend="${trade.tier == 1 ? 'tier-1-header' : (trade.tier == 2 ? 'tier-2-header' : (trade.tier == 3 ? 'tier-3-header' : 'tier-4-header'))}">
    <span>
        <strong th:text="${#temporals.format(trade.date, 'dd.MM.yyyy')}"></strong>
        <span th:if="${trade.tier == 1}" class="ms-2">🔥 BLOCKBUSTER</span>
    </span>
        <div class="d-flex align-items-center gap-3">
            <span class="badge border border-white" th:text="'TIER ' + ${trade.tier}"></span>
            <form th:action="@{/trade-machine/transfers/delete/{id}(id=${trade.id})}" method="post"
                  onsubmit="return confirm('Na pewno usunąć tę wymianę z logów?')">
                <button type="submit" class="btn btn-sm btn-link text-white p-0" style="text-decoration: none;">
                    <span style="font-size: 1.2rem;">&times;</span>
                </button>
            </form>
        </div>
    </div>

    <div class="card-body p-0">
        <div class="row g-0">
            <div th:each="teamEntry : ${trade.involvedTeams}"
                 th:class="${trade.involvedTeams.size() == 3 ? 'col-md-4' : 'col-md-6'} + ' p-4 border-end'">

                <div class="d-flex align-items-center mb-3">
                    <img th:src="${teamEntry.logoPath}" style="height: 35px; width: 35px; object-fit: contain;" class="me-3">
                    <h5 class="fw-bold mb-0 text-uppercase" th:text="${teamEntry.name}"></h5>
                </div>

                <span class="receive-label fw-bold">OTRZYMUJE:</span>

                <ul class="list-unstyled">
                    <li th:each="item : ${trade.items}" th:if="${item.toTeam.id == teamEntry.id}" class="mb-4">
                        <div th:if="${item.player != null}" class="d-flex flex-column">
                            <div class="player-name">
                                <span th:text="${item.player.name + ' ' + item.player.surname}"></span>
                                <span class="text-muted fw-normal" style="font-size: 0.8rem;" th:text="' (z ' + ${item.fromTeam.name} + ')'"></span>
                            </div>

                            <div class="player-meta mt-1">
                                <span class="ovr-badge" th:text="${item.player.rating + ' OVR'}"></span> |
                                <strong th:text="${item.player.position}"></strong> |
                                <span th:text="${item.player.getAge() + ' LAT'}"></span> |
                                <span class="salary-tag" th:text="${item.getSafeSalaryDisplay()}"></span>
                            </div>
                        </div>

                        <div th:if="${item.pickDescription != null}" class="asset-box">
                            <div class="small fw-bold text-dark" th:text="${item.pickDescription}"></div>
                            <div class="text-muted" style="font-size: 0.65rem;" th:text="'z ' + ${item.fromTeam.name}"></div>
                        </div>
                    </li>
                </ul>

                <div class="salary-summary d-flex justify-content-between">
                    <div>
                        <div class="text-incoming">
                            Przyjęte: <strong th:text="'$' + ${#numbers.formatDecimal(trade.getIncomingSalaryForTeam(teamEntry.id), 1, 1)} + 'M'"></strong>
                        </div>
                        <div class="text-outgoing">
                            Oddane: <strong th:text="'$' + ${#numbers.formatDecimal(trade.getOutgoingSalaryForTeam(teamEntry.id), 1, 1)} + 'M'"></strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
