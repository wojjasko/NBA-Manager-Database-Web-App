<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NBA Trade Machine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .team-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; transition: all 0.3s ease; }
        .team-card:hover { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }

        .player-list { background: #0f172a; height: 350px; overflow-y: auto; border-radius: 12px; padding: 12px; border: 1px solid #334155; }

        .player-row { background: #1e293b; margin-bottom: 8px; padding: 10px; border-radius: 10px; border: 1px solid #334155; transition: 0.2s; }
        .player-row:hover { background: #334155; border-color: #475569; }

        .form-select, .form-control { background-color: #0f172a; border: 1px solid #475569; color: white; }
        .form-select:focus, .form-control:focus { background-color: #0f172a; color: white; border-color: #3b82f6; box-shadow: none; }

        .vs-circle { width: 50px; height: 50px; background: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }

        .execute-btn { background: linear-gradient(45deg, #ef4444, #b91c1c); border: none; padding: 12px 40px; font-weight: 800; letter-spacing: 1px; }

        /* Custom scrollbar */
        .player-list::-webkit-scrollbar { width: 6px; }
        .player-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="container py-5">

<div class="text-center mb-5">
    <h1 class="display-5 fw-bold text-white">NBA <span class="text-danger">TRADE</span> MACHINE</h1>
</div>

<form th:action="@{/trade-machine/execute}" method="post" id="tradeForm">

    <div class="card p-3 mb-5 border-0 shadow-lg" style="background: #1e293b; border-radius: 15px;">
        <div class="d-flex justify-content-center align-items-center gap-4 flex-wrap">
            <span class="fw-bold text-uppercase small text-white">Wybierz Poziom (Tier):</span>
            <div th:each="t : ${#numbers.sequence(1,4)}" class="form-check form-check-inline m-0">
                <input class="form-check-input" type="radio" name="tier" th:id="'t'+${t}" th:value="${t}" th:checked="${t==1}">
                <label class="form-check-label fw-bold" th:for="'t'+${t}"
                       th:classappend="${t==1?'text-warning':(t==2?'text-info':'text-white')}"
                       th:text="${t==1?'🥇 TIER 1':(t==2?'🥈 TIER 2':(t==3?'🥉 TIER 3':'TIER 4'))}"></label>
            </div>
        </div>
    </div>

    <div class="row g-4 align-items-center">
        <div th:each="side : ${#strings.arraySplit('A,B,C', ',')}"
             th:id="'colTeam' + ${side}"
             th:class="${side == 'C' ? 'col-md-4 d-none' : 'col-md-5'} + ' team-card-wrapper'">

            <div class="team-card h-100 p-4 shadow">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 th:text="'DRUŻYNA ' + ${side}" class="fw-bold text-primary mb-0"></h6>
                </div>

                <select th:name="'team' + ${side} + 'Id'" class="form-select mb-3"
                        th:id="'team' + ${side} + 'Select'"
                        th:data-side="${side}"
                        onchange="filterPlayers(this.getAttribute('data-side'))">
                    <option value="">Wybierz klub...</option>
                    <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name}"></option>
                </select>

                <div class="player-list" th:id="'players' + ${side}">
                    <div th:each="t : ${teams}" th:id="'team-players-' + ${side} + '-' + ${t.id}"
                         th:class="'team-group-' + ${side}" style="display:none;">

                        <div th:each="p : ${t.players}" class="player-row">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <div class="d-flex align-items-center">
                                    <input type="checkbox" th:name="'playersFrom' + ${side}" th:value="${p.id}" class="form-check-input me-2">
                                    <div class="small fw-bold" th:text="${p.name + ' ' + p.surname}"></div>
                                </div>
                                <span class="badge bg-dark" th:text="${p.rating}"></span>
                            </div>
                            <select th:name="'targetFor' + ${p.id}" class="form-select form-select-sm py-0 shadow-sm" style="font-size: 0.7rem;">
                                <option th:each="target : ${#strings.arraySplit('A,B,C', ',')}"
                                        th:if="${target != side}" th:value="${target}" th:text="'WYŚLIJ DO: ' + ${target}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>

                <div th:id="'picks-container-' + ${side}" class="mt-3">
                    <div class="input-group input-group-sm mb-2 pick-input-group">
                        <input type="text" th:name="'picksFrom' + ${side} + '_0'" class="form-control" placeholder="Opis assetu...">
                        <select th:name="'targetForPick' + ${side} + '_0'" class="form-select" style="max-width: 100px;">
                            <option th:each="target : ${#strings.arraySplit('A,B,C', ',')}"
                                    th:if="${target != side}" th:value="${target}" th:text="'DO ' + ${target}"></option>
                        </select>
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-outline-secondary w-100"
                        th:data-side="${side}" onclick="addPickInput(this.getAttribute('data-side'))">+ DODAJ KOLEJNY ASSET</button>
            </div>
        </div>

        <div id="vs-divider" class="col-md-2 d-flex justify-content-center">
            <div class="vs-circle">VS</div>
        </div>
    </div>

    <div class="text-center mt-5 pt-3">
        <button type="button" id="addTeamCBtn" class="btn btn-outline-info px-4 rounded-pill me-3" onclick="showTeamC()">+ DODAJ 3. DRUŻYNĘ</button>
        <button type="submit" class="btn btn-danger execute-btn rounded-pill shadow-lg">WYKONAJ WYMIANĘ</button>
    </div>
</form>

<script>
    let pickCounters = { 'A': 1, 'B': 1, 'C': 1 };

    function addPickInput(side) {
        const container = document.getElementById('picks-container-' + side);
        const index = pickCounters[side]++;
        const div = document.createElement('div');
        div.className = 'input-group input-group-sm mb-2';

        let options = '';
        ['A', 'B', 'C'].forEach(t => {
            if(t !== side) options += `<option value="${t}">DO ${t}</option>`;
        });

        div.innerHTML = `
            <input type="text" name="picksFrom${side}_${index}" class="form-control" placeholder="Kolejny asset...">
            <select name="targetForPick${side}_${index}" class="form-select" style="max-width: 100px;">
                ${options}
            </select>
        `;
        container.appendChild(div);
    }

    // UPEWNIJ SIĘ, ŻE PONIŻEJ NIE MA DRUGIEJ FUNKCJI addPickInput!
    function showTeamC() {
        document.getElementById('colTeamC').classList.remove('d-none');
        document.getElementById('vs-divider').classList.add('d-none');
        document.querySelectorAll('.team-card-wrapper').forEach(el => {
            el.classList.replace('col-md-5', 'col-md-4');
        });
        document.getElementById('addTeamCBtn').style.display = 'none';
        // Aktywuj selecty dla Team C w pickach innych drużyn
    }

    function filterPlayers(side) {
        const teamId = document.getElementById('team' + side + 'Select').value;
        document.querySelectorAll('.team-group-' + side).forEach(el => el.style.display = 'none');
        if(teamId) {
            const target = document.getElementById('team-players-' + side + '-' + teamId);
            if(target) target.style.display = 'block';
        }
    }
</script>
</body>
</html>
